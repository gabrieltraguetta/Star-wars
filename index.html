<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Star Wars UI</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&display=swap" rel="stylesheet">
</head>
<body>

  <!-- FUNDO -->
  <div class="space"></div>

  <!-- TELA PERSONAGENS (CARROSSEL) -->
  <section id="personagens" class="tela ativa personagens">
    <div class="carousel-wrapper">
      <button class="carousel-btn left" onclick="mudarPagina(-1)">&#10094;</button>

      <div class="carousel-viewport">
        <div class="personagens-track">
          <!-- TODOS OS CARDS EM SEQUÊNCIA HORIZONTAL -->
          <div class="card">
            <img src="darth.jpg" alt="Darth Vader">
            <p>DARTH VADER</p>
          </div>

          <div class="card">
            <img src="han solo.jpg" alt="Han Solo">
            <p>HAN SOLO</p>
          </div>

          <div class="card">
            <img src="skywalker.jpg" alt="Luke Skywalker">
            <p>LUKE SKYWALKER</p>
          </div>

          <div class="card">
            <img src="leia.jpg" alt="Princesa Leia">
            <p>LEIA</p>
          </div>

          <div class="card">
            <img src="chewbacca.jpg" alt="Chewbacca">
            <p>CHEWBACCA</p>
          </div>

          <div class="card">
            <img src="R2-D2.jpg" alt="R2-D2">
            <p>R2-D2</p>
          </div>
          
          <div class="card">
            <img src="yoda.jpg" alt="R2-D2">
            <p>Yoda</p>
          </div>
          
          <div class="card">
            <img src="storm trooper.jpg" alt="R2-D2">
            <p>Storm Trooper</p>
          </div>

          <div class="card">
            <img src="kylo ren.jpg" alt="Yoda">
            <p>kylo Ren</p>
          </div>
        </div>
      </div>

      <button class="carousel-btn right" onclick="mudarPagina(1)">&#10095;</button>
    </div>
  </section>

  <!-- TELA NAVES -->
  <section id="naves" class="tela naves">
    <div class="container">
      <div class="card-wrapper">
        <a href="#" class="card">
          <div class="circle">
            <img src="x-wing (1).png" alt="X-Wing">
          </div>
          <span>X-WING</span>
        </a>
        <button class="btn-saiba" onclick="abrirModal('X-WING', 'Caça da Aliança Rebelde, usado por Luke Skywalker.')">SAIBA MAIS</button>
      </div>

      <div class="card-wrapper">
        <a href="#" class="card">
          <div class="circle">
            <img src="_CLASSIC Millennium Falcon Pic!.png" alt="Millennium Falcon">
          </div>
          <span>MILLENNIUM FALCON</span>
        </a>
        <button class="btn-saiba" onclick="abrirModal('MILLENNIUM FALCON', 'A nave mais rápida da galáxia, pilotada por Han Solo.')">SAIBA MAIS</button>
      </div>

      <div class="card-wrapper">
        <a href="#" class="card">
          <div class="circle">
            <img src="tie.png" alt="TIE Fighter">
          </div>
          <span>TIE FIGHTER</span>
        </a>
        <button class="btn-saiba" onclick="abrirModal('TIE FIGHTER', 'Caça do Império Galáctico, rápido e mortal.')">SAIBA MAIS</button>
      </div>

      <div class="card-wrapper">
        <a href="#" class="card">
          <div class="circle">
            <img src="Death star sphere.png" alt="Estrela da Morte">
          </div>
          <span>ESTRELA DA MORTE</span>
        </a>
        <button class="btn-saiba" onclick="abrirModal('ESTRELA DA MORTE', 'Estação espacial do Império capaz de destruir planetas.')">SAIBA MAIS</button>
      </div>
    </div>
  </section>

  <!-- MODAL -->
  <div id="modal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="modalTitulo"></h2>
        <button class="close" onclick="fecharModal()">&times;</button>
      </div>
      <div class="modal-body">
        <p id="modalTexto"></p>
      </div>
    </div>
  </div>

  <!-- SCRIPT -->
  <script>
    let paginaAtual = 0;
    let cardsPorPagina = 3;
    let totalPaginas = 0;

    function atualizarCarrossel() {
      const track = document.querySelector('.personagens-track');
      const cards = document.querySelectorAll('.personagens-track .card');
      const viewport = document.querySelector('.carousel-viewport');
      
      if (!track || cards.length === 0) return;
      
      // Calcula quantos cards cabem por página
      const viewportWidth = viewport.offsetWidth;
      const cardWidth = cards[0].offsetWidth;
      const gap = 20;
      
      cardsPorPagina = Math.floor(viewportWidth / (cardWidth + gap));
      if (cardsPorPagina < 1) cardsPorPagina = 1;
      
      totalPaginas = Math.ceil(cards.length / cardsPorPagina);
      
      // Ajusta página atual
      if (paginaAtual >= totalPaginas) {
        paginaAtual = totalPaginas - 1;
      }
      if (paginaAtual < 0) paginaAtual = 0;
      
      // Calcula e aplica deslocamento
      const deslocamento = paginaAtual * cardsPorPagina * (cardWidth + gap);
      track.style.transform = `translateX(-${deslocamento}px)`;
    }

    function mudarPagina(direcao) {
      paginaAtual += direcao;
      
      if (paginaAtual < 0) paginaAtual = 0;
      if (paginaAtual >= totalPaginas) paginaAtual = totalPaginas - 1;
      
      atualizarCarrossel();
    }
    
    function abrirModal(titulo, texto) {
      document.getElementById('modalTitulo').innerText = titulo;
      document.getElementById('modalTexto').innerText = texto;
      document.getElementById('modal').style.display = 'flex';
    }
    
    function fecharModal() {
      document.getElementById('modal').style.display = 'none';
    }
    
    // Fecha modal clicando fora
    window.onclick = function(event) {
      const modal = document.getElementById('modal');
      if (event.target === modal) {
        fecharModal();
      }
    }
    
    // Inicializa o carrossel
    window.addEventListener('load', function() {
      atualizarCarrossel();
    });
    
    window.addEventListener('resize', function() {
      atualizarCarrossel();
    });
  </script>

</body>
</html>
