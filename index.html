<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Star Wars UI</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="space"></div>

<div class="container">

  <a href="https://pt.wikipedia.org/wiki/X-wing" class="card">
    <div class="circle">
      <img src="x-wing (1).png">
    </div>
    <span>X-WING</span>
  </a>

  <a href="https://pt.wikipedia.org/wiki/Millennium_Falcon" class="card">
    <div class="circle">
      <img src="_CLASSIC Millennium Falcon Pic!.png">
    </div>
    <span>MILLENNIUM FALCON</span>
  </a>

  <a href="https://pt.wikipedia.org/wiki/TIE_Fighter" class="card">
    <div class="circle">
      <img src="tie.png">
    </div>
    <span>TIE FIGHTER</span>
  </a>

  <a href="https://pt.wikipedia.org/wiki/Estrela_da_Morte" class="card">
    <div class="circle">
      <img src="Death star sphere.png">
    </div>
    <span>ESTRELA DA MORTE</span>
  </a>

</div>

</body>
</html>
